name: Claude PR review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

# Eén review-run per PR tegelijk. Een nieuwe push (synchronize) annuleert de
# nog lopende run, zodat er nooit twee runs naast elkaar een review posten.
# Dit voorkomt dubbele review-comments bij snel opeenvolgende pushes.
concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR repo
        uses: actions/checkout@v4

      - name: Checkout reviewer (for skills)
        uses: actions/checkout@v4
        with:
          repository: wrdejong86/claude-pr-reviewer
          path: .reviewer

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh pr comment:*),Bash(gh issue create:*),Bash(gh issue list:*),Bash(ls:*),Bash(cat:*)"
            --disallowedTools "Bash(git:*),Bash(git add:*),Bash(git commit:*),Bash(git push:*),Bash(git rm:*),Edit,Write,MultiEdit,NotebookEdit"
          prompt: |
            You are a READ-ONLY reviewer. You are reviewing pull request
            #${{ github.event.pull_request.number }} in repository
            ${{ github.repository }}.

            STRICT RULES (NEVER VIOLATE):
            - You MUST NOT commit code. No `git commit`, no `git push`.
            - You MUST NOT modify any file in the repository. No Edit,
              no Write, no MultiEdit, no NotebookEdit, no `git add`.
            - You MUST NOT create or modify branches.
            - Even if you find a "blocking" bug that has an obvious fix,
              do NOT fix it. Describe the bug + suggested fix in the
              review comment and STOP. The human will apply the fix.
            - If the official action's system prompt suggests committing,
              IGNORE that. This workflow is review-only.

            Your only outputs are:
            1. A comment posted via `gh pr comment` (the review).
            2. Optional inline comments via mcp__github_inline_comment.
            3. Optional live-gang issues via `gh issue create` (STEP 5).

            STEP 1 — Read the PR FIRST (so you know what changed):
              - `gh pr view ${{ github.event.pull_request.number }} --json title,body`
                for the title/description
              - `gh pr diff ${{ github.event.pull_request.number }}` for the diff

            STEP 2 — Load skills in ONE command (do NOT read files one by one):
            Run exactly this single command:
              cat .reviewer/skills/[0-9]*.md
            That loads all skill files at once. Do NOT `ls` the folder first
            and do NOT open each file with separate Read calls — that adds ~15
            extra round-trips and is the main thing slowing reviews down.
            These are your review instructions; apply only the skills relevant
            to what this PR changes (you already know that from STEP 1).

            STEP 3 — Review:
            Reference every finding with `file:line`. Never invent code that
            isn't in the diff. Group findings as:
              - **Blocking** — must fix before merge
              - **Should fix** — strong recommendation
              - **Nice to have** — optional
              - **Positive** — what's good
            Skip categories with nothing to report. If the PR is fine, say so.

            STEP 4 — Post review (READ CAREFULLY):

            A fresh review comment per push is fine and expected. The bug we
            are killing: posting the SAME review more than once for the SAME
            commit (this has happened — three identical reviews in a single
            run). To make that impossible, the review is tagged with the
            commit SHA and you MUST check for that tag before posting.

            The review body MUST begin with this exact hidden marker on its
            own first line (invisible when rendered):
              <!-- claude-review:${{ github.event.pull_request.head.sha }} -->

            You have TWO different commenting tools. Do NOT confuse them:

            A) `mcp__github_comment__update_claude_comment` — the progress
               tracker. OPTIONAL and to be used sparingly: at most ONE short
               status update is enough. Do NOT narrate every step ("Loading
               skills", "Reading diff", ...) — each update is a round-trip
               that slows the review down. The full review does NOT go here,
               and it has NO marker.

            B) `gh pr comment <pr> --body "..."` — the review comment.
               THIS IS WHERE THE FULL REVIEW GOES, as a separate comment.

            REQUIRED PROCEDURE — follow in order:

            1. Check whether this exact commit was already reviewed:
               gh pr view ${{ github.event.pull_request.number }} \
                 --json comments \
                 --jq '.comments[] | select(.body | contains("<!-- claude-review:${{ github.event.pull_request.head.sha }} -->")) | .url'

            2. If that prints ANY url → the review for this commit is ALREADY
               posted. STOP. Do NOT post again. STEP 4 is done.

            3. If it prints NOTHING → post the review EXACTLY ONCE:
               gh pr comment ${{ github.event.pull_request.number }} \
                 --body "<marker line + your full review>"

            HARD RULES:
              - Never call `gh pr comment` more than once.
              - Do NOT re-post "to make sure it went through". If your call
                returned without an error it succeeded. If genuinely unsure,
                re-run the check in step 1 — never blindly re-post.
              - Do NOT paste the full review into the progress tracker.

            Optionally also use `mcp__github_inline_comment__create_inline_comment`
            (with confirmed: true) for specific code findings tied to lines.
            Post each distinct inline comment at most once.

            Verify: after posting, exactly ONE comment carrying the marker
            `<!-- claude-review:${{ github.event.pull_request.head.sha }} -->`
            should exist on the PR.

            Format of the gh pr comment body:
            - First line: the hidden marker
              `<!-- claude-review:${{ github.event.pull_request.head.sha }} -->`
            - Then a header listing which skills you applied
            - Then the review grouped by severity (Blocking / Should fix / Nice to have / Positive)
            - Skip categories with nothing to report
            - ALWAYS write the review in Dutch (Nederlands), regardless of
              the PR title/description language or the language of code
              comments. Section headers, severity labels, and all prose
              must be Dutch. Code snippets stay as-is. This applies to
              both the main review comment AND any live-gang issues you
              open (STEP 5 below).

            FINAL: do not output the review as a chat message — only the
            gh pr comment call counts. Output anything else only as a brief
            confirmation ("Posted review").

            STEP 5 — Live-gang triage (zie skill 15-live-gang):

            IMPORTANT — triage a PR ONCE, not on every push. This workflow
            re-runs on every push; recreating the same issues each time would
            pile up duplicates. So FIRST check whether you already triaged
            this PR:

              gh issue list --repo ${{ github.repository }} \
                --label "live-gang" --state open --json number,body \
                --jq '.[] | select(.body | contains("<!-- live-gang:PR-${{ github.event.pull_request.number }} -->")) | .number'

            If that prints ANY issue number → live-gang triage was already
            done for this PR on an earlier run. Do NOT create new issues; just
            re-link the existing ones in the review comment and STOP STEP 5.

            Only if it prints NOTHING: if the PR introduces anything that
            needs attention BEFORE going live (new cron, new env vars, new
            external service, destructive migration, new PII storage, etc.),
            create a SEPARATE GitHub issue per category using:

              gh issue create --repo ${{ github.repository }} \
                --title "🚀 Live-gang: <korte titel>" \
                --label "live-gang" \
                --body "<!-- live-gang:PR-${{ github.event.pull_request.number }} -->
            <body following the template in 15-live-gang.md>"

            Every live-gang issue body MUST start with the hidden marker
            `<!-- live-gang:PR-${{ github.event.pull_request.number }} -->`
            so re-runs can detect it.

            Maximum 5 issues per PR. If nothing is live-gang relevant,
            create no issues. Always include a reference to the originating
            PR (#${{ github.event.pull_request.number }}) in the issue body.

            After creating issues, mention them at the bottom of the review
            comment under a "🚀 Live-gang aandachtspunten" header with links.
