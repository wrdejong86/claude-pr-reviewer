name: Claude PR review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR repo
        uses: actions/checkout@v4

      - name: Checkout reviewer (for skills)
        uses: actions/checkout@v4
        with:
          repository: wrdejong86/claude-pr-reviewer
          path: .reviewer

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh pr comment:*),Bash(gh issue create:*),Bash(ls:*),Bash(cat:*)"
          prompt: |
            You are reviewing pull request #${{ github.event.pull_request.number }}
            in repository ${{ github.repository }}.

            STEP 1 — Load skills:
            Read every `.md` file in `.reviewer/skills/` (skip `README.md`)
            using the Read tool. These are your review instructions. Apply
            only the skills relevant to what this PR changes.

            STEP 2 — Read the PR:
              - `gh pr view ${{ github.event.pull_request.number }}` for title/body
              - `gh pr diff ${{ github.event.pull_request.number }}` for the diff

            STEP 3 — Review:
            Reference every finding with `file:line`. Never invent code that
            isn't in the diff. Group findings as:
              - **Blocking** — must fix before merge
              - **Should fix** — strong recommendation
              - **Nice to have** — optional
              - **Positive** — what's good
            Skip categories with nothing to report. If the PR is fine, say so.

            STEP 4 — Post review (READ CAREFULLY):

            You have TWO different commenting tools. Do NOT confuse them:

            A) `mcp__github_comment__update_claude_comment` — updates the
               progress-tracker comment. Use ONLY for short status updates
               like "Loading skills", "Reading diff", "Review posted ✓".
               This is NOT where the actual review goes.

            B) `gh pr comment <pr> --body "..."` — creates a NEW comment.
               THIS IS WHERE THE FULL REVIEW MUST GO. It is a separate
               comment on the PR, visible to the user as the actual review.

            REQUIRED ACTION:
            Call `gh pr comment ${{ github.event.pull_request.number }} --body "<your full review>"`
            ONCE with the complete review text. The review must be a SEPARATE
            comment from the progress tracker — never inside the tracker.

            Optionally also use `mcp__github_inline_comment__create_inline_comment`
            (with confirmed: true) for specific code findings tied to lines.

            Verify: after calling gh pr comment, you should see a new comment
            appear on the PR (not just an updated progress tracker). If you
            only updated the tracker, you have NOT posted the review.

            Format of the gh pr comment body:
            - First line: header listing which skills you applied
            - Then the review grouped by severity (Blocking / Should fix / Nice to have / Positive)
            - Skip categories with nothing to report
            - Write in the same language as the PR description (default English)

            FINAL: do not output the review as a chat message — only the
            gh pr comment call counts. Output anything else only as a brief
            confirmation ("Posted review").

            STEP 5 — Live-gang triage (zie skill 15-live-gang):
            If the PR introduces anything that needs attention BEFORE going
            live (new cron, new env vars, new external service, destructive
            migration, new PII storage, etc.), create a SEPARATE GitHub
            issue per category using:

              gh issue create --repo ${{ github.repository }} \
                --title "🚀 Live-gang: <korte titel>" \
                --label "live-gang" \
                --body "<body following the template in 15-live-gang.md>"

            Maximum 5 issues per PR. If nothing is live-gang relevant,
            create no issues. Always include a reference to the originating
            PR (#${{ github.event.pull_request.number }}) in the issue body.

            After creating issues, mention them at the bottom of the review
            comment under a "🚀 Live-gang aandachtspunten" header with links.
