name: Claude PR review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR repo
        uses: actions/checkout@v4

      - name: Checkout reviewer (for skills)
        uses: actions/checkout@v4
        with:
          repository: wrdejong86/claude-pr-reviewer
          path: .reviewer

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh pr comment:*),Bash(ls:*),Bash(cat:*)"
          prompt: |
            You are reviewing pull request #${{ github.event.pull_request.number }}
            in repository ${{ github.repository }}.

            STEP 1 — Load skills:
            Read every `.md` file in `.reviewer/skills/` (skip `README.md`)
            using the Read tool. These are your review instructions. Apply
            only the skills relevant to what this PR changes.

            STEP 2 — Read the PR:
              - `gh pr view ${{ github.event.pull_request.number }}` for title/body
              - `gh pr diff ${{ github.event.pull_request.number }}` for the diff

            STEP 3 — Review:
            Reference every finding with `file:line`. Never invent code that
            isn't in the diff. Group findings as:
              - **Blocking** — must fix before merge
              - **Should fix** — strong recommendation
              - **Nice to have** — optional
              - **Positive** — what's good
            Skip categories with nothing to report. If the PR is fine, say so.

            STEP 4 — Post review:
            Post ONE top-level comment with:
              `gh pr comment ${{ github.event.pull_request.number }} --body "<your review>"`
            Optionally also use `mcp__github_inline_comment__create_inline_comment`
            (with confirmed: true) for specific code findings.

            IMPORTANT: Only post via these GitHub tools — do NOT just output
            the review text as a message; it will be lost. The review only
            counts if it lands as a PR comment.

            Start the body with a one-line header listing which skills you
            applied. Write the review in the same language as the PR
            description (default English).
